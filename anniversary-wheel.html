<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>一週年命運轉盤</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
  color:#4A4A4A;min-height:100vh;display:flex;justify-content:center;align-items:center;
  overflow:hidden;position:relative;
}

/* === Animated BG === */
.bg{position:fixed;inset:0;z-index:-2;
  background:linear-gradient(135deg,#FFF5F5 0%,#FFE4E1 25%,#FFF0F5 50%,#FFEEF2 75%,#FFF5F5 100%);
  background-size:400% 400%;animation:bgShift 15s ease infinite;}
.bg-particles{position:fixed;inset:0;z-index:-1;overflow:hidden;pointer-events:none;}
.bg-p{position:absolute;opacity:0;animation:floatUp linear infinite;}
@keyframes bgShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes floatUp{
  0%{transform:translateY(105vh) rotate(0deg) scale(.7);opacity:0}
  8%{opacity:var(--op,.07)}
  85%{opacity:var(--op,.07)}
  100%{transform:translateY(-10vh) rotate(var(--rot,180deg)) scale(.3);opacity:0}
}
/* sparkle twinkle */
.bg-sparkle{position:absolute;width:3px;height:3px;border-radius:50%;
  background:radial-gradient(circle,#F4E4C1,transparent);
  animation:twinkle ease-in-out infinite;opacity:0;}
@keyframes twinkle{0%,100%{opacity:0;transform:scale(.5)}50%{opacity:.6;transform:scale(1.2)}}

/* === Landing === */
#landing{text-align:center;animation:fadeIn 1.2s ease;padding:40px 20px;position:relative;}
.landing-deco{font-size:3.2rem;margin-bottom:8px;animation:pulse 2s ease infinite;}
#landing h1{font-size:2.2rem;color:#C45C5C;margin-bottom:.3rem;text-shadow:0 2px 10px rgba(196,92,92,.12);}
.landing-date{font-size:.95rem;color:#E8B4B8;letter-spacing:3px;margin-bottom:.5rem;}
#landing .subtitle{font-size:1.15rem;color:#C45C5C;margin-bottom:1.8rem;opacity:.85;}
.landing-hearts{font-size:1.3rem;margin-bottom:1.5rem;letter-spacing:6px;animation:pulse 3s ease infinite;}
#landing button{
  background:linear-gradient(135deg,#E8B4B8,#C45C5C);color:#fff;border:none;
  padding:16px 48px;font-size:1.15rem;border-radius:50px;cursor:pointer;
  transition:transform .2s,box-shadow .2s;box-shadow:0 6px 25px rgba(200,92,92,.35);
  position:relative;overflow:hidden;}
#landing button::after{content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);
  transform:translateX(-100%);animation:shimmer 2.5s ease infinite;}
#landing button:hover{transform:scale(1.06);box-shadow:0 8px 30px rgba(200,92,92,.45);}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
</style>
</head>
<body>
<div class="bg"></div>
<div class="bg-particles" id="bgParticles"></div>

<!-- Landing -->
<div id="landing">
  <div class="landing-deco">💝</div>
  <h1>一週年命運轉盤</h1>
  <div class="landing-date">2026 · 04 · 03</div>
  <p class="subtitle">轉動看看，我今天屬於你 ❤️</p>
  <div class="landing-hearts">💖 💕 ✨ 💖 💕</div>
  <button onclick="startGame()">開始轉動</button>
</div>

<!-- Game Screen -->
<div id="game">
  <div class="top-bar">
    <button class="top-btn" onclick="showCollection()">📖 圖鑑 <span class="badge" id="collBadge">0/12</span></button>
    <button class="top-btn" onclick="showAchievements()">🏆 成就 <span class="badge" id="achBadge">0</span></button>
  </div>
  <div class="wheel-container">
    <canvas id="wheelCanvas" width="400" height="400"></canvas>
    <!-- Center pointer (static triangle + click target) -->
    <div class="center-pointer" id="centerPointer" onclick="spin()">
      <svg viewBox="0 0 60 60" width="60" height="60">
        <polygon points="30,8 18,42 42,42" fill="#C45C5C" stroke="#fff" stroke-width="2.5"/>
        <circle cx="30" cy="38" r="5" fill="#E8B4B8" stroke="#fff" stroke-width="1.5"/>
      </svg>
      <div class="center-label">點我</div>
    </div>
  </div>
</div>

<!-- Gift Card Modal -->
<div class="modal-overlay" id="prizeModal">
  <div class="gift-card" id="giftCard">
    <div class="gift-card-ribbon"></div>
    <div class="gift-card-top">
      <div class="gift-card-badge" id="modalEmoji"></div>
      <div class="gift-card-title">兌換券</div>
    </div>
    <div class="gift-card-body">
      <div class="gift-card-name" id="modalName"></div>
      <div class="gift-card-divider"><span>✦ ✦ ✦</span></div>
      <div class="gift-card-desc" id="modalDesc"></div>
    </div>
    <div class="gift-card-footer">
      <div class="gift-card-from">From Taka with ♡</div>
      <div class="gift-card-valid">有效期限：永遠</div>
    </div>
    <div class="gift-card-buttons" id="modalButtons"></div>
    <div class="gift-card-new" id="modalNew" style="display:none">✨ NEW</div>
  </div>
</div>

<!-- Collection Panel -->
<div class="panel-overlay" id="collPanel">
  <div class="panel">
    <div class="panel-header">
      <h2>📖 獎品圖鑑</h2>
      <button class="panel-close" onclick="closePanel('collPanel')">✕</button>
    </div>
    <div class="panel-progress"><div class="panel-bar" id="collBar"></div></div>
    <div class="panel-count" id="collCount">已收集 0 / 12</div>
    <div class="coll-grid" id="collGrid"></div>
  </div>
</div>

<!-- Achievement Panel -->
<div class="panel-overlay" id="achPanel">
  <div class="panel">
    <div class="panel-header">
      <h2>🏆 成就系統</h2>
      <button class="panel-close" onclick="closePanel('achPanel')">✕</button>
    </div>
    <div class="ach-list" id="achList"></div>
  </div>
</div>

<!-- Easter Egg -->
<div id="easterEgg">
  <h2>既然針壞了... 那這些全都給你吧 ❤️</h2>
  <div class="egg-prizes" id="eggPrizes"></div>
  <button onclick="resetGame()">修好針針（重新開始）</button>
</div>

<div class="toast" id="toast"></div>
<div class="ach-toast" id="achToast"><span id="achToastText"></span></div>
<canvas id="confettiCanvas"></canvas>

<style>
/* === Game === */
#game{display:none;text-align:center;position:relative;animation:fadeIn .8s ease;width:100%;padding-top:10px;}
.top-bar{display:flex;justify-content:center;gap:12px;margin-bottom:8px;}
.top-btn{background:rgba(255,255,255,.85);border:1.5px solid #F4E4C1;border-radius:20px;
  padding:6px 16px;font-size:.82rem;color:#C45C5C;cursor:pointer;
  transition:transform .2s,box-shadow .2s;backdrop-filter:blur(4px);}
.top-btn:hover{transform:scale(1.05);box-shadow:0 2px 12px rgba(232,180,184,.3);}
.badge{background:#E8B4B8;color:#fff;border-radius:10px;padding:1px 7px;font-size:.7rem;margin-left:4px;}
.wheel-container{position:relative;display:inline-block;margin-top:4px;}
#wheelCanvas{border-radius:50%;
  box-shadow:0 0 40px rgba(232,180,184,.35),0 0 0 8px #E8B4B8,0 0 0 12px #F4E4C1,0 0 0 16px rgba(232,180,184,.15);}

/* Center pointer */
.center-pointer{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  cursor:pointer;z-index:10;user-select:none;-webkit-user-select:none;
  transition:transform .15s;filter:drop-shadow(0 3px 8px rgba(196,92,92,.35));}
.center-pointer:hover{transform:translate(-50%,-50%) scale(1.1);}
.center-pointer:active{transform:translate(-50%,-50%) scale(.92);}
.center-pointer.wobble{animation:ptrWobble .35s ease;}
.center-pointer.tilt{transform:translate(-50%,-50%) rotate(18deg);}
.center-pointer.fly-off{animation:flyOff .8s ease-in forwards;}
.center-label{font-size:.65rem;color:#C45C5C;text-align:center;margin-top:-4px;
  animation:bounce 1.5s ease infinite;}

/* === Gift Card === */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);
  backdrop-filter:blur(4px);z-index:50;justify-content:center;align-items:center;}
.modal-overlay.active{display:flex;}
.gift-card{width:320px;max-width:90vw;background:linear-gradient(160deg,#FFFAF9,#FFF5F5,#FFFAF9);
  border-radius:20px;overflow:hidden;position:relative;
  box-shadow:0 20px 60px rgba(196,92,92,.2),0 0 0 1px rgba(232,180,184,.3);
  animation:cardIn .4s cubic-bezier(.34,1.56,.64,1);}
.gift-card.special{background:linear-gradient(160deg,#FFF0F0,#FFE0E0,#FFF0F0);
  box-shadow:0 20px 60px rgba(220,20,60,.25),0 0 0 1px rgba(220,20,60,.2);}
.gift-card-ribbon{height:6px;background:linear-gradient(90deg,#E8B4B8,#C45C5C,#E8B4B8);}
.gift-card.special .gift-card-ribbon{background:linear-gradient(90deg,#DC143C,#FF6B6B,#DC143C);height:8px;}
.gift-card-top{padding:24px 20px 10px;text-align:center;}
.gift-card-badge{width:72px;height:72px;margin:0 auto 8px;
  background:linear-gradient(135deg,#FFF,#FFF5F5);border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:2.8rem;
  box-shadow:0 4px 20px rgba(232,180,184,.3);border:3px solid #F4E4C1;}
.gift-card-title{font-size:.75rem;color:#E8B4B8;letter-spacing:6px;}
.gift-card-body{padding:6px 24px 14px;text-align:center;}
.gift-card-name{font-size:1.4rem;color:#C45C5C;font-weight:bold;margin-bottom:6px;}
.gift-card-divider{color:#F4E4C1;font-size:.7rem;letter-spacing:4px;margin-bottom:8px;}
.gift-card-desc{font-size:.92rem;color:#666;line-height:1.6;}
.gift-card .special-text{font-size:.95rem;color:#C45C5C;line-height:2;white-space:pre-line;}
.gift-card .disclaimer{font-size:.78rem;color:#999;margin-top:6px;}
.gift-card-footer{padding:10px 24px;display:flex;justify-content:space-between;
  border-top:1px dashed #F4E4C1;margin:0 16px;}
.gift-card-from,.gift-card-valid{font-size:.7rem;color:#ccc;}
.gift-card-buttons{padding:14px 24px 22px;text-align:center;}
.gift-card-buttons button{background:linear-gradient(135deg,#E8B4B8,#C45C5C);color:#fff;border:none;
  padding:11px 28px;font-size:.95rem;border-radius:50px;cursor:pointer;margin:4px;
  transition:transform .2s;box-shadow:0 4px 15px rgba(196,92,92,.25);}
.gift-card-buttons button:hover{transform:scale(1.05);}
.gift-card-buttons button.secondary{background:#F4E4C1;color:#4A4A4A;box-shadow:0 4px 15px rgba(244,228,193,.4);}
.gift-card-new{position:absolute;top:14px;right:16px;background:linear-gradient(135deg,#FFD700,#FFA500);
  color:#fff;font-size:.65rem;padding:3px 10px;border-radius:10px;font-weight:bold;
  animation:pulse 1s ease infinite;}
@keyframes cardIn{from{transform:scale(.5) translateY(40px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}

/* === Panels (Collection & Achievement) === */
.panel-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);
  backdrop-filter:blur(3px);z-index:55;justify-content:center;align-items:center;}
.panel-overlay.active{display:flex;}
.panel{background:#fff;border-radius:20px;width:360px;max-width:92vw;max-height:80vh;
  overflow-y:auto;padding:24px;animation:cardIn .35s ease;}
.panel-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.panel-header h2{font-size:1.15rem;color:#C45C5C;}
.panel-close{background:none;border:none;font-size:1.2rem;cursor:pointer;color:#ccc;padding:4px 8px;}
.panel-close:hover{color:#C45C5C;}
.panel-progress{height:6px;background:#F4E4C1;border-radius:3px;margin-bottom:6px;overflow:hidden;}
.panel-bar{height:100%;background:linear-gradient(90deg,#E8B4B8,#C45C5C);border-radius:3px;
  transition:width .5s ease;width:0;}
.panel-count{font-size:.78rem;color:#999;margin-bottom:14px;text-align:center;}

/* Collection grid */
.coll-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.coll-card{background:#FAFAFA;border-radius:14px;padding:14px 8px;text-align:center;
  border:1.5px solid #F4E4C1;transition:transform .2s,box-shadow .2s;position:relative;}
.coll-card.unlocked{background:#FFF;border-color:#E8B4B8;
  box-shadow:0 2px 12px rgba(232,180,184,.2);}
.coll-card.locked{filter:grayscale(.8);opacity:.5;}
.coll-card .emoji{font-size:1.8rem;}
.coll-card .name{font-size:.75rem;color:#C45C5C;margin-top:4px;}
.coll-card.locked .name{color:#bbb;}
.coll-card .lock-icon{font-size:1.8rem;color:#ddd;}
.coll-card .count{font-size:.6rem;color:#E8B4B8;margin-top:2px;}

/* Achievement list */
.ach-list{display:flex;flex-direction:column;gap:10px;}
.ach-item{display:flex;align-items:center;gap:12px;padding:12px;border-radius:14px;
  background:#FAFAFA;border:1.5px solid #F4E4C1;transition:all .2s;}
.ach-item.done{background:#FFF;border-color:#E8B4B8;box-shadow:0 2px 10px rgba(232,180,184,.15);}
.ach-item.locked{opacity:.5;}
.ach-icon{font-size:1.6rem;width:40px;text-align:center;}
.ach-info{flex:1;}
.ach-name{font-size:.9rem;color:#C45C5C;font-weight:bold;}
.ach-desc{font-size:.75rem;color:#999;margin-top:2px;}
.ach-check{font-size:1rem;color:#E8B4B8;}
.ach-item.done .ach-check{color:#C45C5C;}

/* Achievement toast */
.ach-toast{position:fixed;top:10%;left:50%;transform:translateX(-50%) translateY(-20px);
  background:linear-gradient(135deg,#FFF,#FFF5F5);border:2px solid #F4E4C1;
  border-radius:16px;padding:12px 24px;z-index:100;pointer-events:none;
  opacity:0;transition:all .4s ease;box-shadow:0 8px 30px rgba(196,92,92,.2);
  font-size:.9rem;color:#C45C5C;white-space:nowrap;}
.ach-toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* === Toast === */
.toast{position:fixed;top:20%;left:50%;transform:translateX(-50%) scale(0);
  background:rgba(74,74,74,.92);color:#fff;padding:14px 28px;border-radius:24px;
  font-size:1.05rem;z-index:100;pointer-events:none;
  transition:transform .3s ease,opacity .3s ease;opacity:0;backdrop-filter:blur(4px);}
.toast.show{transform:translateX(-50%) scale(1);opacity:1;}

/* === Easter Egg === */
#easterEgg{display:none;position:fixed;inset:0;background:rgba(255,245,245,.97);
  z-index:60;justify-content:center;align-items:center;flex-direction:column;
  overflow-y:auto;padding:30px 20px;}
#easterEgg.active{display:flex;}
#easterEgg h2{font-size:1.4rem;color:#C45C5C;margin-bottom:24px;animation:pulse 1.5s ease infinite;text-align:center;}
.egg-prizes{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:420px;width:100%;margin-bottom:24px;}
.egg-prize-card{background:#fff;border-radius:14px;padding:14px 8px;text-align:center;
  box-shadow:0 2px 12px rgba(232,180,184,.3);animation:glowPulse 1.5s ease infinite alternate;
  border:1px solid rgba(232,180,184,.2);}
.egg-prize-card .emoji{font-size:2rem;}
.egg-prize-card .name{font-size:.8rem;color:#C45C5C;margin-top:6px;}
#easterEgg button{background:linear-gradient(135deg,#E8B4B8,#C45C5C);color:#fff;border:none;
  padding:14px 36px;font-size:1rem;border-radius:50px;cursor:pointer;box-shadow:0 4px 15px rgba(196,92,92,.3);}
#confettiCanvas{position:fixed;inset:0;z-index:70;pointer-events:none;}

/* === Animations === */
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
@keyframes ptrWobble{
  0%{transform:translate(-50%,-50%) rotate(0)}
  25%{transform:translate(-50%,-50%) rotate(-14deg)}
  50%{transform:translate(-50%,-50%) rotate(14deg)}
  75%{transform:translate(-50%,-50%) rotate(-7deg)}
  100%{transform:translate(-50%,-50%) rotate(0)}}
@keyframes flyOff{
  0%{transform:translate(-50%,-50%) rotate(0) translateY(0);opacity:1}
  100%{transform:translate(-50%,-50%) rotate(720deg) translateY(-700px);opacity:0}}
@keyframes glowPulse{
  from{box-shadow:0 2px 12px rgba(232,180,184,.3)}
  to{box-shadow:0 4px 24px rgba(196,92,92,.45)}}

@media(max-width:480px){
  #landing h1{font-size:1.7rem}
  .gift-card{width:290px}
  .gift-card-badge{width:60px;height:60px;font-size:2.2rem}
  .panel{width:95vw;padding:18px}
  .coll-grid{gap:8px}
  .center-pointer svg{width:50px;height:50px}
}
</style>

<script>
// === Data ===
const prizes=[
  {id:1,emoji:"🥡",name:"早餐外送券",desc:"你選店，我買單，送到你面前（我不會煮，但我會點）",color:"#FFB6C1"},
  {id:2,emoji:"📸",name:"專屬攝影師",desc:"幫你拍一組美照",color:"#FFE4E1"},
  {id:3,emoji:"🎬",name:"電影選片權",desc:"今晚電影你選，我絕不抱怨",color:"#FFB6C1"},
  {id:4,emoji:"💆",name:"按摩兌換券",desc:"15分鐘專業級肩頸按摩，無條件",color:"#FFE4E1"},
  {id:5,emoji:"🍰",name:"甜點外送券",desc:"突然想吃什麼？現在立刻買給你",color:"#FFB6C1"},
  {id:6,emoji:"🎤",name:"卡拉OK卷",desc:"整晚歌單你決定，我當最佳聽眾",color:"#FFE4E1"},
  {id:7,emoji:"🛁",name:"雙人泡泡浴",desc:"一起泡",color:"#FFB6C1"},
  {id:8,emoji:"📝",name:"願望實現券",desc:"寫下一個願望，我會在30天內實現",color:"#FFE4E1"},
  {id:9,emoji:"🎮",name:"遊戲陪玩券",desc:"陪你玩任何遊戲，不喊累、不偷看攻略",color:"#FFB6C1"},
  {id:10,emoji:"🚶",name:"隨傳隨到卷",desc:"陪你走到任何地方，幫你拿東西、撐傘、拍照",color:"#FFE4E1"},
  {id:11,emoji:"🌙",name:"深夜聊天券",desc:"不管多晚，陪你聊到你想睡為止",color:"#FFB6C1"},
  {id:12,emoji:"🔥",name:"無限色色券",desc:"今晚你說了算，次數、地點、姿勢，無上限",color:"#DC143C",isSpecial:true}
];

const achievements=[
  {id:"first_spin",icon:"🎰",name:"初次轉動",desc:"第一次轉動轉盤",check:s=>s.totalSpins>=1},
  {id:"spin5",icon:"🌀",name:"轉不停",desc:"累計轉動 5 次",check:s=>s.totalSpins>=5},
  {id:"spin10",icon:"💫",name:"轉盤達人",desc:"累計轉動 10 次",check:s=>s.totalSpins>=10},
  {id:"collect3",icon:"📦",name:"小小收藏家",desc:"收集 3 種不同獎品",check:s=>Object.keys(s.collected).length>=3},
  {id:"collect6",icon:"🎁",name:"半數達成",desc:"收集 6 種不同獎品",check:s=>Object.keys(s.collected).length>=6},
  {id:"collect12",icon:"👑",name:"全圖鑑制霸",desc:"收集全部 12 種獎品",check:s=>Object.keys(s.collected).length>=12},
  {id:"special",icon:"🔥",name:"命運之人",desc:"抽中無限色色券",check:s=>s.collected[12]},
  {id:"easter",icon:"💔",name:"破壞王",desc:"觸發彩蛋：弄壞針針",check:s=>s.easterEggFound},
  {id:"repeat",icon:"🔄",name:"真愛不變",desc:"同一個獎品抽中 3 次",check:s=>Object.values(s.collected).some(c=>c>=3)},
];

// === State ===
let state = loadState();
let currentRotation=0, isSpinning=false, spinCooldown=false, easterEggTriggered=false;
let clickCount=0, lastClickTime=0, spinTimerId=null;
const SEG=30;

function defaultState(){return {totalSpins:0,collected:{},achUnlocked:[],easterEggFound:false};}
function loadState(){
  try{const s=JSON.parse(localStorage.getItem('wheel_state'));return s||defaultState();}
  catch(e){return defaultState();}
}
function saveState(){localStorage.setItem('wheel_state',JSON.stringify(state));}

// === BG Particles (hearts, stars, sparkles) ===
function initBg(){
  const c=document.getElementById('bgParticles');
  const items=['💝','💖','💕','♡','❤','✨','⭐','·','♥','💗','✦','🌟'];
  for(let i=0;i<28;i++){
    const el=document.createElement('div');
    el.className='bg-p';
    el.textContent=items[Math.floor(Math.random()*items.length)];
    el.style.left=Math.random()*100+'%';
    el.style.fontSize=(.7+Math.random()*1.4)+'rem';
    el.style.animationDuration=(10+Math.random()*18)+'s';
    el.style.animationDelay=(Math.random()*15)+'s';
    el.style.setProperty('--rot',(90+Math.random()*270)+'deg');
    el.style.setProperty('--op',(.04+Math.random()*.06).toFixed(2));
    c.appendChild(el);
  }
  // sparkles
  for(let i=0;i<15;i++){
    const s=document.createElement('div');
    s.className='bg-sparkle';
    s.style.left=Math.random()*100+'%';
    s.style.top=Math.random()*100+'%';
    s.style.animationDuration=(2+Math.random()*3)+'s';
    s.style.animationDelay=(Math.random()*4)+'s';
    s.style.width=s.style.height=(2+Math.random()*3)+'px';
    c.appendChild(s);
  }
}
initBg();

// === Draw Wheel ===
function drawWheel(){
  const canvas=document.getElementById('wheelCanvas');
  const size=Math.min(window.innerWidth*.85,380);
  canvas.width=size;canvas.height=size;
  const ctx=canvas.getContext('2d'),cx=size/2,cy=size/2,r=size/2-4;
  for(let i=0;i<12;i++){
    const sa=(i*SEG-90)*Math.PI/180, ea=((i+1)*SEG-90)*Math.PI/180;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,sa,ea);ctx.closePath();
    ctx.fillStyle=prizes[i].color;ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();
    ctx.save();ctx.translate(cx,cy);
    const ma=((i*SEG+SEG/2)-90)*Math.PI/180;
    ctx.rotate(ma);
    ctx.font=`${r*.14}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(prizes[i].emoji,r*.5,0);
    ctx.font=`bold ${r*.07}px "Noto Sans TC",sans-serif`;
    ctx.fillStyle=prizes[i].isSpecial?'#fff':'#4A4A4A';
    ctx.fillText(prizes[i].name,r*.77,0);
    ctx.restore();
  }
  ctx.beginPath();ctx.arc(cx,cy,r*.22,0,Math.PI*2);
  ctx.fillStyle='#FFF5F5';ctx.fill();
  ctx.strokeStyle='#E8B4B8';ctx.lineWidth=3;ctx.stroke();
}

// === Spin ===
function spin(){
  if(easterEggTriggered)return;

  // Always track rapid clicks, even while spinning
  const now=Date.now();
  if(now-lastClickTime<600){clickCount++;}else{clickCount=1;}
  lastClickTime=now;
  const ptr=document.getElementById('centerPointer');

  if(clickCount>=7){
    if(state.totalSpins>=10){triggerEasterEgg();return;}
    else{showToast('再多轉幾次嘛～');return;}
  }
  if(clickCount>=5){
    showToast('喂！要壞掉了啦！');
    ptr.classList.remove('wobble');ptr.classList.add('tilt');createSparks();return;
  }
  if(clickCount>=3){
    showToast('好像有點鬆了...？');
    ptr.classList.remove('tilt');ptr.classList.add('wobble');
    setTimeout(()=>ptr.classList.remove('wobble'),350);return;
  }

  // Only block normal spin if already spinning or cooling down
  if(isSpinning||spinCooldown)return;

  ptr.classList.remove('tilt','wobble');
  document.querySelector('.center-label').style.display='none';
  isSpinning=true;

  // Random total rotation: 5-7 full spins + random offset
  const extraSpins=(5+Math.floor(Math.random()*3))*360;
  const randomOffset=Math.random()*360;
  const totalDeg=extraSpins+randomOffset;
  currentRotation+=totalDeg;

  const canvas=document.getElementById('wheelCanvas');
  const dur=5+Math.random()*2;
  canvas.style.transition=`transform ${dur}s cubic-bezier(.25,.1,.25,1)`;
  canvas.style.transform=`rotate(${currentRotation}deg)`;
  if(navigator.vibrate)navigator.vibrate(50);

  spinTimerId=setTimeout(()=>{
    spinTimerId=null;
    if(easterEggTriggered)return;
    isSpinning=false;
    const r=((currentRotation%360)+360)%360;
    const topAngle=(360-r)%360;
    const idx=Math.floor(topAngle/SEG)%12;
    recordPrize(prizes[idx]);
    showPrizeModal(prizes[idx]);
  },dur*1000+200);
}

// === Record & Achievements ===
function recordPrize(prize){
  state.totalSpins++;
  state.collected[prize.id]=(state.collected[prize.id]||0)+1;
  checkAchievements();
  saveState();
  updateBadges();
}

function checkAchievements(){
  achievements.forEach(a=>{
    if(!state.achUnlocked.includes(a.id)&&a.check(state)){
      state.achUnlocked.push(a.id);
      showAchToast(`🏆 成就解鎖：${a.name}`);
    }
  });
}

function updateBadges(){
  const n=Object.keys(state.collected).length;
  document.getElementById('collBadge').textContent=`${n}/12`;
  document.getElementById('achBadge').textContent=state.achUnlocked.length;
}

// === Prize Modal ===
function showPrizeModal(prize){
  const overlay=document.getElementById('prizeModal');
  const card=document.getElementById('giftCard');
  document.getElementById('modalEmoji').textContent=prize.emoji;
  document.getElementById('modalName').textContent=prize.name;
  const isNew=state.collected[prize.id]===1;
  document.getElementById('modalNew').style.display=isNew?'block':'none';

  if(prize.isSpecial){
    card.className='gift-card special';
    document.getElementById('modalDesc').innerHTML=
      `<div class="special-text">今晚，時鐘歸零\n規則歸零\n只有你我</div>
       <div class="disclaimer">*需雙方同意，安全詞依然有效 😏</div>`;
    document.getElementById('modalButtons').innerHTML=
      `<button onclick="closeModal()">立即兌換</button>
       <button class="secondary" onclick="confirmSave()">先存著</button>`;
  }else{
    card.className='gift-card';
    document.getElementById('modalDesc').textContent=prize.desc;
    document.getElementById('modalButtons').innerHTML=
      `<button onclick="spinAgain()">再轉一次</button>`;
  }
  overlay.classList.add('active');
}

function closeModal(){document.getElementById('prizeModal').classList.remove('active');}
let saveConfirmed=false;
function confirmSave(){
  if(!saveConfirmed){saveConfirmed=true;
    document.getElementById('modalButtons').querySelector('.secondary').textContent='你確定？🥺';return;}
  saveConfirmed=false;closeModal();
}
function spinAgain(){spinCooldown=true;closeModal();setTimeout(()=>{spinCooldown=false;},1000);}

// === Collection Panel ===
function showCollection(){
  const grid=document.getElementById('collGrid');
  grid.innerHTML='';
  const n=Object.keys(state.collected).length;
  document.getElementById('collBar').style.width=(n/12*100)+'%';
  document.getElementById('collCount').textContent=`已收集 ${n} / 12`;
  prizes.forEach(p=>{
    const card=document.createElement('div');
    const unlocked=!!state.collected[p.id];
    card.className='coll-card '+(unlocked?'unlocked':'locked');
    if(unlocked){
      card.innerHTML=`<div class="emoji">${p.emoji}</div><div class="name">${p.name}</div>
        <div class="count">×${state.collected[p.id]}</div>`;
    }else{
      card.innerHTML=`<div class="lock-icon">🔒</div><div class="name">???</div>`;
    }
    grid.appendChild(card);
  });
  document.getElementById('collPanel').classList.add('active');
}

// === Achievement Panel ===
function showAchievements(){
  const list=document.getElementById('achList');
  list.innerHTML='';
  achievements.forEach(a=>{
    const done=state.achUnlocked.includes(a.id);
    const el=document.createElement('div');
    el.className='ach-item '+(done?'done':'locked');
    el.innerHTML=`<div class="ach-icon">${a.icon}</div>
      <div class="ach-info"><div class="ach-name">${a.name}</div><div class="ach-desc">${a.desc}</div></div>
      <div class="ach-check">${done?'✅':'○'}</div>`;
    list.appendChild(el);
  });
  document.getElementById('achPanel').classList.add('active');
}

function closePanel(id){document.getElementById(id).classList.remove('active');}

// === Easter Egg ===
function triggerEasterEgg(){
  easterEggTriggered=true;
  isSpinning=false;
  if(spinTimerId){clearTimeout(spinTimerId);spinTimerId=null;}
  showToast('啊啊啊——');
  state.easterEggFound=true;
  // unlock all prizes
  prizes.forEach(p=>{if(!state.collected[p.id])state.collected[p.id]=1;});
  checkAchievements();saveState();updateBadges();

  const ptr=document.getElementById('centerPointer');
  ptr.classList.remove('tilt','wobble');ptr.classList.add('fly-off');
  const canvas=document.getElementById('wheelCanvas');
  currentRotation+=1800;
  canvas.style.transition='transform 3s cubic-bezier(.25,.1,.25,1)';
  canvas.style.transform=`rotate(${currentRotation}deg)`;

  setTimeout(()=>{
    const egg=document.getElementById('easterEgg');
    const c=document.getElementById('eggPrizes');c.innerHTML='';
    prizes.forEach((p,i)=>{
      const card=document.createElement('div');card.className='egg-prize-card';
      card.style.animationDelay=(i*.08)+'s';
      card.innerHTML=`<div class="emoji">${p.emoji}</div><div class="name">${p.name}</div>`;
      c.appendChild(card);
    });
    egg.classList.add('active');startConfetti();
  },3500);
}

function createSparks(){
  const btn=document.getElementById('centerPointer');
  const rect=btn.getBoundingClientRect();
  for(let i=0;i<10;i++){
    const spark=document.createElement('div');
    const a=(Math.PI*2/10)*i;
    const colors=['#F4E4C1','#E8B4B8','#C45C5C','#FFB6C1','#FFD700'];
    spark.style.cssText=`position:fixed;width:5px;height:5px;border-radius:50%;z-index:100;pointer-events:none;
      background:${colors[i%5]};left:${rect.left+rect.width/2}px;top:${rect.top+rect.height/2}px;
      transition:all .6s ease-out;`;
    document.body.appendChild(spark);
    requestAnimationFrame(()=>{
      spark.style.transform=`translate(${Math.cos(a)*55}px,${Math.sin(a)*55}px)`;
      spark.style.opacity='0';
    });
    setTimeout(()=>spark.remove(),700);
  }
}

// === Confetti ===
function startConfetti(){
  const cv=document.getElementById('confettiCanvas');
  cv.width=window.innerWidth;cv.height=window.innerHeight;
  const ctx=cv.getContext('2d');
  const ps=[];
  const syms=['❤','💖','💝','💕','✨','⭐','♡','💗','🌟'];
  for(let i=0;i<100;i++){
    ps.push({x:Math.random()*cv.width,y:Math.random()*-cv.height,
      size:Math.random()*16+6,speed:Math.random()*3+1,
      wobble:Math.random()*Math.PI*2,ws:Math.random()*.04+.01,
      rot:Math.random()*Math.PI*2,rs:(Math.random()-.5)*.06,
      sym:syms[Math.floor(Math.random()*syms.length)]});
  }
  let aid;
  function anim(){
    ctx.clearRect(0,0,cv.width,cv.height);let active=false;
    ps.forEach(p=>{
      p.y+=p.speed;p.wobble+=p.ws;p.rot+=p.rs;p.x+=Math.sin(p.wobble)*.7;
      if(p.y<cv.height+20)active=true;
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);
      ctx.font=`${p.size}px sans-serif`;ctx.fillText(p.sym,-p.size/2,p.size/2);
      ctx.restore();
    });
    if(active)aid=requestAnimationFrame(anim);
  }
  anim();
  setTimeout(()=>{cancelAnimationFrame(aid);ctx.clearRect(0,0,cv.width,cv.height);},7000);
}

// === Toasts ===
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1500);
}
function showAchToast(msg){
  const t=document.getElementById('achToast');
  document.getElementById('achToastText').textContent=msg;
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);
}

// === Game Flow ===
function startGame(){
  document.getElementById('landing').style.display='none';
  document.getElementById('game').style.display='block';
  drawWheel();updateBadges();
}

function resetGame(){
  easterEggTriggered=false;clickCount=0;lastClickTime=0;
  saveConfirmed=false;currentRotation=0;
  document.getElementById('easterEgg').classList.remove('active');
  const ptr=document.getElementById('centerPointer');
  ptr.classList.remove('fly-off','tilt','wobble');
  document.querySelector('.center-label').style.display='';
  const canvas=document.getElementById('wheelCanvas');
  canvas.style.transition='none';canvas.style.transform='rotate(0deg)';
  drawWheel();updateBadges();
}

window.addEventListener('resize',()=>{
  if(document.getElementById('game').style.display!=='none'){
    const c=document.getElementById('wheelCanvas'),t=c.style.transform;
    drawWheel();c.style.transform=t;
  }
});
</script>
